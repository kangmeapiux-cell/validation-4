version: '3.8'

# docker-compose.yml — Local development environment for validation-4
# Provides DynamoDB Local for offline development without AWS credentials.
#
# Usage:
#   docker-compose up -d          # Start DynamoDB Local
#   docker-compose down           # Stop and remove containers
#   docker-compose logs -f        # Follow logs
#
# After starting, create the table:
#   aws dynamodb create-table \
#     --table-name validation-4-tasks-local \
#     --attribute-definitions AttributeName=id,AttributeType=S \
#     --key-schema AttributeName=id,KeyType=HASH \
#     --billing-mode PAY_PER_REQUEST \
#     --endpoint-url http://localhost:8000 \
#     --region us-east-1
#
# Then seed data:
#   TASKS_TABLE=validation-4-tasks-local \
#   AWS_REGION=us-east-1 \
#   AWS_ENDPOINT_URL=http://localhost:8000 \
#   node scripts/seed-data.js

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest

    ports:
      - '8000:8000'
    command: ['-jar', 'DynamoDBLocal.jar', '-sharedDb', '-inMemory']
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest

    ports:
      - '8001:8001'
    environment:
      DYNAMO_ENDPOINT: 'http://dynamodb-local:8000'
      AWS_REGION: 'us-east-1'
      AWS_ACCESS_KEY_ID: 'local'
      AWS_SECRET_ACCESS_KEY: 'local'
    depends_on:
      dynamodb-local:
        condition: service_healthy

networks:
  default:
    name: validation-4-network
